<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradiente foglia principale -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9FF" />
      <stop offset="100%" stop-color="#92FE9D" />
    </linearGradient>
    <!-- Ombra per un tocco "fresh" e moderno -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.25" flood-color="#0066cc" />
    </filter>
  </defs>

  <!-- Forma a foglia stilizzata (ruotata a 45 gradi) -->
  <path d="M 15 85 C 15 35 45 15 85 15 C 85 65 55 85 15 85 Z" 
        fill="url(#leafGrad)" 
        filter="url(#shadow)" />

  <!-- Grafico Dati al centro -->
  <g>
    <!-- Assi X e Y -->
    <path d="M 35 65 L 35 35" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M 35 65 L 65 65" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Linea di andamento dei dati -->
    <path d="M 35 55 L 45 42 L 55 48 L 65 32" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Nodi dati -->
    <circle cx="35" cy="55" r="3.5" fill="#ffffff" />
    <circle cx="45" cy="42" r="3.5" fill="#ffffff" />
    <circle cx="55" cy="48" r="3.5" fill="#ffffff" />
    <circle cx="65" cy="32" r="3.5" fill="#ffffff" />
  </g>
</svg>
